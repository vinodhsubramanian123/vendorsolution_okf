name: CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install uv
      uses: astral-sh/setup-uv@v3
    - name: Set up Python
      run: uv python install 3.11
    - name: Install dependencies
      run: uv sync --extra dev
    - name: Seed knowledge repository from sources/pdfs/
      run: uv run python -m ikp_platform.scripts.ingest_catalog
    - name: Run Pytest
      run: uv run pytest tests/ -v
